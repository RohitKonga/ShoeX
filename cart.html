<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - ShoeX</title>
    <link rel="stylesheet" href="nike.css">
    <link rel="stylesheet" href="cart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="header-container"></div>
    <script>
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-container').innerHTML = data;
            });
    </script>

    <div class="cart-container">
        <h2>Shopping Cart</h2>
        <div class="cart-content">
            <div class="cart-items">
                <div class="cart-item">
                    <div class="item-image">
                        <img src="images/shoe2.jpg" alt="Nike Air Max">
                    </div>
                    <div class="item-details">
                        <h3>Nike Air Max 270 React</h3>
                        <p class="item-size">Size: 9</p>
                        <p class="item-color">Color: Black/White</p>
                        <div class="item-price">
                            <span class="current-price">₹1,999</span>
                            <span class="original-price">₹2,999</span>
                            <span class="discount">33% off</span>
                        </div>
                    </div>
                    <div class="item-quantity">
                        <button class="quantity-btn minus">-</button>
                        <span class="quantity">1</span>
                        <button class="quantity-btn plus">+</button>
                    </div>
                    <div class="item-total">
                        <span>₹1,999</span>
                    </div>
                    <button class="remove-item"><i class="fas fa-trash"></i></button>
                </div>

                <div class="cart-item">
                    <div class="item-image">
                        <img src="images/shoe1.jpg" alt="Nike Air Max">
                    </div>
                    <div class="item-details">
                        <h3>Nike Air Max 270</h3>
                        <p class="item-size">Size: 8</p>
                        <p class="item-color">Color: Red/Black</p>
                        <div class="item-price">
                            <span class="current-price">₹9,999</span>
                            <span class="original-price">₹12,999</span>
                            <span class="discount">23% off</span>
                        </div>
                    </div>
                    <div class="item-quantity">
                        <button class="quantity-btn minus">-</button>
                        <span class="quantity">1</span>
                        <button class="quantity-btn plus">+</button>
                    </div>
                    <div class="item-total">
                        <span>₹9,999</span>
                    </div>
                    <button class="remove-item"><i class="fas fa-trash"></i></button>
                </div>
            </div>

            <div class="cart-summary">
                <h3>Order Summary</h3>
                <div class="summary-details">
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>₹11,998</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span>Free</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax</span>
                        <span>₹1,200</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span>₹13,198</span>
                    </div>
                </div>
                <div class="promo-code">
                    <input type="text" placeholder="Enter promo code">
                    <button class="apply-btn">Apply</button>
                </div>
                <div class="checkout-actions">
                    <a href="nike.html" class="continue-shopping">Continue Shopping</a>
                    <a href="checkout.html" class="proceed-checkout">Proceed to Checkout</a>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>
    <script>
        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-container').innerHTML = data;
            });
    </script>
</body>
</html>
