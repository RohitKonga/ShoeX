<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - ShoeX</title>
    <link rel="stylesheet" href="nike.css">
    <link rel="stylesheet" href="checkout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="header-container"></div>
    <script>
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-container').innerHTML = data;
            });
    </script>

    <div class="checkout-container">
        <div class="checkout-progress">
            <div class="progress-step active">
                <div class="step-number">1</div>
                <div class="step-title">Shipping</div>
            </div>
            <div class="progress-step">
                <div class="step-number">2</div>
                <div class="step-title">Payment</div>
            </div>
            <div class="progress-step">
                <div class="step-number">3</div>
                <div class="step-title">Review</div>
            </div>
        </div>

        <div class="checkout-content">
            <div class="checkout-form">
                <h2>Shipping Information</h2>
                <form>
                    <div class="form-group">
                        <label for="fullname">Full Name</label>
                        <input type="text" id="fullname" placeholder="Enter your full name">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" placeholder="Enter your email">
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" placeholder="Enter your phone number">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="address">Street Address</label>
                        <input type="text" id="address" placeholder="Enter your street address">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="city">City</label>
                            <input type="text" id="city" placeholder="Enter your city">
                        </div>
                        <div class="form-group">
                            <label for="state">State</label>
                            <input type="text" id="state" placeholder="Enter your state">
                        </div>
                        <div class="form-group">
                            <label for="zip">ZIP Code</label>
                            <input type="text" id="zip" placeholder="Enter ZIP code">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="country">Country</label>
                        <select id="country">
                            <option value="">Select your country</option>
                            <option value="india">India</option>
                            <option value="usa">United States</option>
                            <option value="uk">United Kingdom</option>
                            <option value="canada">Canada</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="save-info">
                            Save this information for next time
                        </label>
                    </div>
                </form>
            </div>

            <div class="order-summary">
                <h3>Order Summary</h3>
                <div class="summary-items">
                    <div class="summary-item">
                        <div class="item-info">
                            <img src="images/shoe2.jpg" alt="Nike Air Max">
                            <div>
                                <h4>Nike Air Max 270 React</h4>
                                <p>Size: 9 | Color: Black/White</p>
                            </div>
                        </div>
                        <div class="item-price">₹1,999</div>
                    </div>
                    <div class="summary-item">
                        <div class="item-info">
                            <img src="images/shoe1.jpg" alt="Nike Air Max">
                            <div>
                                <h4>Nike Air Max 270</h4>
                                <p>Size: 8 | Color: Red/Black</p>
                            </div>
                        </div>
                        <div class="item-price">₹9,999</div>
                    </div>
                </div>

                <div class="summary-details">
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>₹11,998</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span>Free</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax</span>
                        <span>₹1,200</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span>₹13,198</span>
                    </div>
                </div>

                <div class="checkout-actions">
                    <a href="cart.html" class="back-to-cart">Back to Cart</a>
                    <a href="payment.html" class="proceed-payment">Proceed to Payment</a>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>
    <script>
        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-container').innerHTML = data;
            });
    </script>
</body>
</html>
